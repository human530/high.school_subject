# CI：每次 push / PR 自動做全域檢查，避免錯誤上線
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 全部 JS 語法檢查（syntax check）
        run: |
          set -e
          for f in 數學/app/js/*.js 數學/app/data/*.js 數學/app/sw.js api/llm.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: 全域資料完整性檢查
        run: node tests/check-data.js

      - name: 驗證 manifest 為合法 JSON
        run: node -e "JSON.parse(require('fs').readFileSync('數學/app/manifest.webmanifest','utf8')); console.log('manifest OK')"
